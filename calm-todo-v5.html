<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calm To-Do</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // -------------------------------------------------------
  // PASTE YOUR FIREBASE CONFIG HERE
  // -------------------------------------------------------
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  // -------------------------------------------------------

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  window._db   = db;
  window._ref  = ref;
  window._set  = set;
  window._upd  = update;
  window._rem  = remove;
  window._onValue = onValue;
  window.firebaseReady = true;
  document.dispatchEvent(new Event("firebaseReady"));
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f7f7f5;
    --surface:   #ffffff;
    --surface2:  #f1f0ec;
    --border:    rgba(0,0,0,0.10);
    --border2:   rgba(0,0,0,0.18);
    --text:      #1a1a18;
    --text2:     #5f5e5a;
    --text3:     #9a9994;
    --radius:    12px;
    --radius-sm: 8px;
  }

  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #app { max-width: 580px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ---------- typography ---------- */
  h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
  p  { line-height: 1.6; }

  /* ---------- inputs ---------- */
  input, select, textarea {
    width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); background: var(--surface);
    font-size: 14px; font-family: inherit; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: #5DCAA5; }
  textarea { resize: vertical; min-height: 60px; }

  /* ---------- cards ---------- */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 0.5px solid var(--border); margin-bottom: 0.65rem;
    overflow: hidden; transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-body  { padding: 1rem 1.1rem; }
  .card-actions {
    display: flex; border-top: 0.5px solid var(--border);
  }
  .card-actions button {
    flex: 1; padding: 8px; background: transparent; border: none;
    border-right: 0.5px solid var(--border); color: var(--text2);
    font-size: 12px; cursor: pointer; font-family: inherit;
    transition: background 0.12s;
  }
  .card-actions button:last-child { border-right: none; }
  .card-actions button:hover { background: var(--surface2); }
  .card-actions button.primary { color: #0F6E56; font-weight: 500; }

  /* ---------- pills ---------- */
  .pill {
    display: inline-block; font-size: 11px; padding: 2px 9px;
    border-radius: 10px; font-weight: 500;
  }

  /* ---------- bucket header ---------- */
  .bucket-header {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border: 0.5px solid var(--border);
    cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500;
    transition: opacity 0.15s;
  }
  .bucket-header:hover { opacity: 0.85; }
  .bucket-header.open  { border-radius: var(--radius) var(--radius) 0 0; }
  .bucket-header.closed{ border-radius: var(--radius); }
  .bucket-body {
    border: 0.5px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 10px 10px 4px; margin-bottom: 1rem;
  }

  /* ---------- action bar ---------- */
  .add-btn {
    width: 100%; padding: 11px; border-radius: var(--radius);
    border: 1.5px dashed var(--border2); background: transparent;
    color: var(--text2); font-size: 14px; cursor: pointer;
    margin-bottom: 1.25rem; font-family: inherit; transition: all 0.15s;
  }
  .add-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--text3); }

  /* ---------- form card ---------- */
  .form-card {
    background: var(--surface2); border-radius: var(--radius);
    border: 0.5px solid var(--border); padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .form-row > div { flex: 1; }
  label.field-label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }

  /* ---------- buttons ---------- */
  .btn-save {
    flex: 1; padding: 9px; border-radius: var(--radius-sm);
    border: 0.5px solid #9FE1CB; background: #E1F5EE; color: #04342C;
    font-size: 14px; cursor: pointer; font-weight: 500; font-family: inherit;
  }
  .btn-save:hover { background: #9FE1CB; }
  .btn-cancel {
    padding: 9px 16px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text2); font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .btn-cancel:hover { background: var(--surface2); }

  /* ---------- tabs ---------- */
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tab {
    padding: 7px 18px; border-radius: 20px; border: 0.5px solid var(--border2);
    background: transparent; color: var(--text2); font-size: 13px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .tab.active { background: #E1F5EE; color: #04342C; border-color: #9FE1CB; font-weight: 500; }

  /* ---------- stats ---------- */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .stat  { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; text-align: center; }
  .stat-n{ font-size: 26px; font-weight: 500; }
  .stat-l{ font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ---------- donut ---------- */
  .donut-wrap {
    display: flex; align-items: center; gap: 24px;
    padding: 1.25rem 1.5rem; background: var(--surface);
    border-radius: var(--radius); border: 0.5px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .donut-bars { flex: 1; }
  .bar-row { margin-bottom: 14px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
  .bar-track { height: 6px; background: var(--surface2); border-radius: 4px; }
  .bar-fill  { height: 6px; border-radius: 4px; transition: width 0.5s ease; }

  /* ---------- steps ---------- */
  .step-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 4px; }
  .step-row input[type=checkbox] { width: 14px; height: 14px; margin-top: 2px; flex-shrink: 0; accent-color: #1D9E75; cursor: pointer; }
  .step-text { font-size: 12px; color: var(--text2); }
  .step-text.done { text-decoration: line-through; color: var(--text3); }

  /* ---------- modal overlay ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem; z-index: 100;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    border: 0.5px solid var(--border2); padding: 1.75rem;
    width: 100%; max-width: 420px;
  }

  /* ---------- misc ---------- */
  .empty { text-align: center; padding: 2rem 1rem; color: var(--text2); font-size: 14px; }
  .meta  { font-size: 10px; color: var(--text3); margin-top: 7px; }
  .flex-gap { display: flex; gap: 8px; }
  .step-progress { height: 3px; background: var(--surface2); border-radius: 2px; margin-bottom: 7px; }
  .step-progress-fill { height: 3px; background: #5DCAA5; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<div id="app"><p style="text-align:center;padding:3rem;color:#9a9994;">Loading...</p></div>

<script>
// ─── constants ───────────────────────────────────────────────────────────────
const TAGS = ["Home","Health","Work","Errand","Other"];
const PRIORITIES = [
  { value:"today",     label:"Today if possible",  bg:"#9FE1CB", text:"#04342C", accent:"#E1F5EE" },
  { value:"soon",      label:"Soon",                bg:"#B5D4F4", text:"#042C53", accent:"#E6F1FB" },
  { value:"whenever",  label:"Whenever you can",    bg:"#D3D1C7", text:"#2C2C2A", accent:"#F1EFE8" },
  { value:"roadahead", label:"Down the Road",        bg:"#F4C0D1", text:"#4B1528", accent:"#FBEAF0" },
];
const TAG_COLORS = { Home:"#9FE1CB",Health:"#B5D4F4",Work:"#F4C0D1",Errand:"#FAC775",Other:"#D3D1C7" };
const TAG_TEXT   = { Home:"#04342C",Health:"#042C53",Work:"#4B1528",Errand:"#412402",Other:"#2C2C2A" };
const PRI_MAP    = Object.fromEntries(PRIORITIES.map(p => [p.value, p]));
const PRI_ICONS  = { today:"🌟", soon:"🔵", whenever:"🌿", roadahead:"🛤️" };
const PRI_ORDER  = ["today","soon","whenever","roadahead"];

const SEED_TASKS = [
  { title:"Refill Adderall",                          tag:"Health", priority:"today" },
  { title:"Pick up Adderall",                         tag:"Health", priority:"today" },
  { title:"Fill out timesheets for 3 weeks",          tag:"Work",   priority:"today" },
  { title:"Get rid of Buddy",                         tag:"Home",   priority:"today" },
  { title:"Take van to Dave",                         tag:"Errand", priority:"today" },
  { title:"Fix soffit hole",                          tag:"Home",   priority:"today" },
  { title:"Replace Cheryl's front door lock or find key", tag:"Home", priority:"today" },
  { title:"Get Cheryl's Photos",                      tag:"Errand", priority:"today" },
  { title:"Schedule colonoscopy",                     tag:"Health", priority:"today" },
  { title:"Install ceiling fan",                      tag:"Home",   priority:"whenever" },
  { title:"Replace modem with customer supplied",     tag:"Home",   priority:"whenever" },
  { title:"Get rid of washers and treadmill",         tag:"Home",   priority:"whenever" },
  { title:"Clean up / organize computer room",        tag:"Home",   priority:"whenever" },
  { title:"Fill propane tanks",                       tag:"Errand", priority:"whenever" },
  { title:"Reseal the deck",                          tag:"Home",   priority:"whenever" },
  { title:"Fix cabinet cart in basement",             tag:"Home",   priority:"whenever" },
  { title:"Make a couch table",                       tag:"Home",   priority:"whenever" },
  { title:"Reset Silas phone",                        tag:"Errand", priority:"whenever" },
  { title:"Fix golf cart",                            tag:"Errand", priority:"whenever" },
  { title:"Fix go-kart",                              tag:"Errand", priority:"whenever" },
  { title:"Replace windows",                          tag:"Home",   priority:"whenever" },
  { title:"Cloak holder",                             tag:"Home",   priority:"whenever" },
  { title:"Mount mantle",                             tag:"Home",   priority:"whenever" },
];

// ─── state ────────────────────────────────────────────────────────────────────
let state = { tasks:{}, wins:{}, name:"", view:"tasks", buckets:{}, outcomeTaskId:null, showAdd:false, editTaskId:null, editWinId:null };

// ─── firebase helpers ────────────────────────────────────────────────────────
function dbRef(path) { return window._ref(window._db, path); }
async function dbSet(path, val) { await window._set(dbRef(path), val); }
async function dbUpd(path, val) { await window._upd(dbRef(path), val); }
async function dbRem(path)      { await window._rem(dbRef(path)); }
function dbListen(path, cb)     { window._onValue(dbRef(path), snap => cb(snap.val())); }

// ─── utils ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
function html(str) { const d = document.createElement("div"); d.innerHTML = str; return d.firstChild; }

// ─── render ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (!state.name) { app.appendChild(renderNameScreen()); return; }
  if (state.outcomeTaskId) { app.appendChild(renderOutcomeModal()); }
  app.appendChild(renderMain());
}

function renderNameScreen() {
  const wrap = el("div", { style:{ maxWidth:"420px", margin:"0 auto", paddingTop:"3rem" } });
  const icon = html(`<div style="width:48px;height:48px;background:#E1F5EE;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>`);
  const h = el("h1",{},"Welcome");
  const p = el("p",{style:{color:"var(--text2)",marginBottom:"1.5rem"}},"What's your name? Just so tasks show who added them.");
  const inp = el("input",{placeholder:"Your name...",style:{marginBottom:"12px"}});
  const btn = el("button",{className:"btn-save",style:{width:"100%"},onClick:()=>{
    const n = inp.value.trim(); if(!n) return;
    state.name = n; localStorage.setItem("calm-todo-name", n); render();
  }},"Let's go");
  inp.addEventListener("keydown", e => { if(e.key==="Enter") btn.click(); });
  wrap.append(icon,h,p,inp,btn);
  return wrap;
}

function renderOutcomeModal() {
  const task = state.tasks[state.outcomeTaskId];
  if (!task) { state.outcomeTaskId = null; return document.createDocumentFragment(); }
  const overlay = el("div",{className:"modal-overlay"});
  const modal   = el("div",{className:"modal"});
  const icon = html(`<div style="width:36px;height:36px;background:#E1F5EE;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0F6E56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`);
  const lbl  = el("p",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.05em"}},"Nice work!");
  const title= el("p",{style:{fontSize:"17px",fontWeight:"500",marginBottom:"1.25rem"}},task.title);
  const fl   = el("label",{className:"field-label"},"How did it go? (optional)");
  const ta   = el("textarea",{placeholder:"Even just a word or two is great...",style:{marginBottom:"14px"}});
  const row  = el("div",{className:"flex-gap"});
  const save = el("button",{className:"btn-save",onClick:async()=>{
    const win = { id:uid(), title:task.title, tag:task.tag, outcome:ta.value.trim(), completedBy:state.name, completedAt:new Date().toISOString() };
    await dbSet("wins/"+win.id, win);
    await dbRem("tasks/"+state.outcomeTaskId);
    state.outcomeTaskId = null;
  }},"Save to wins log");
  const skip = el("button",{className:"btn-cancel",onClick:async()=>{
    const win = { id:uid(), title:task.title, tag:task.tag, outcome:"", completedBy:state.name, completedAt:new Date().toISOString() };
    await dbSet("wins/"+win.id, win);
    await dbRem("tasks/"+state.outcomeTaskId);
    state.outcomeTaskId = null;
  }},"Skip");
  row.append(save,skip);
  modal.append(icon,lbl,title,fl,ta,row);
  overlay.appendChild(modal);
  return overlay;
}

function renderMain() {
  const wrap = el("div",{});

  // header
  const hdr = el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1.75rem"}});
  const hdrL = el("div",{});
  hdrL.appendChild(el("h1",{},`Hey, ${state.name}`));
  hdrL.appendChild(el("p",{style:{color:"var(--text2)",fontSize:"14px"}},"You don't have to do everything. Just one thing."));
  const hdrR = html(`<div style="width:42px;height:42px;background:#E1F5EE;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3v1m0 16v1M4.22 4.22l.707.707m13.86 13.86.707.707M3 12h1m16 0h1M4.927 19.073l.707-.707M18.364 5.636l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/></svg></div>`);
  hdr.append(hdrL, hdrR);
  wrap.appendChild(hdr);

  // stats
  const tasks = Object.values(state.tasks);
  const wins  = Object.values(state.wins);
  const todayW = wins.filter(w => new Date(w.completedAt).toDateString()===new Date().toDateString()).length;
  const weekW  = wins.filter(w => (Date.now()-new Date(w.completedAt))<7*86400000).length;
  const statsEl = el("div",{className:"stats"});
  [[tasks.length,"to do"],[todayW,"done today"],[weekW,"this week"]].forEach(([n,l])=>{
    const s = el("div",{className:"stat"});
    s.appendChild(el("div",{className:"stat-n"},String(n)));
    s.appendChild(el("div",{className:"stat-l"},l));
    statsEl.appendChild(s);
  });
  wrap.appendChild(statsEl);

  // donut chart
  wrap.appendChild(renderDonut(tasks.length, wins.length));

  // search
  const searchWrap = el("div",{style:{position:"relative",marginBottom:"1.25rem"}});
  const searchInp  = el("input",{placeholder:"Search tasks and wins...",style:{paddingLeft:"32px"}});
  searchInp.value  = state.search||"";
  searchInp.addEventListener("input",()=>{ state.search=searchInp.value; render(); });
  const searchIcon = html(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.4;"><circle cx="11" cy="11" r="7" stroke="#1a1a18" stroke-width="2"/><path d="M16.5 16.5L21 21" stroke="#1a1a18" stroke-width="2" stroke-linecap="round"/></svg>`);
  searchWrap.append(searchIcon, searchInp);
  wrap.appendChild(searchWrap);

  // tabs
  const tabs = el("div",{className:"tabs"});
  ["tasks","wins"].forEach(v => {
    const label = v==="tasks" ? "Tasks" : `Wins log${wins.length>0?" ("+wins.length+")":""}`;
    const t = el("button",{className:"tab"+(state.view===v?" active":""),onClick:()=>{ state.view=v; render(); }},label);
    tabs.appendChild(t);
  });
  wrap.appendChild(tabs);

  if (state.view==="tasks") wrap.appendChild(renderTasksView(tasks));
  else wrap.appendChild(renderWinsView(wins));
  return wrap;
}

function renderDonut(todo, done) {
  const total = todo+done;
  const pctDone = total ? Math.round((done/total)*100) : 0;
  const pctTodo = total ? Math.round((todo/total)*100) : 0;
  const r=52,cx=70,cy=70,stroke=14,circ=2*Math.PI*r;
  const doneArc=(done/(total||1))*circ, todoArc=(todo/(total||1))*circ, gap=total>0?3:0;
  const wrap = el("div",{className:"donut-wrap"});
  const svg = html(`<svg width="140" height="140" style="flex-shrink:0;">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f0ec" stroke-width="${stroke}"/>
    ${total>0?`
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#D3D1C7" stroke-width="${stroke}"
      stroke-dasharray="${todoArc-gap} ${circ-todoArc+gap}" stroke-dashoffset="${-(doneArc+gap/2)}" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#5DCAA5" stroke-width="${stroke}"
      stroke-dasharray="${doneArc-gap} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>`:``}
    <text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="22" font-weight="500" fill="#1a1a18">${total===0?"–":pctDone+"%"}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="11" fill="#9a9994">complete</text>
  </svg>`);
  const bars = el("div",{className:"donut-bars"});
  [{label:"Completed",pct:pctDone,count:done,color:"#5DCAA5",tc:"#0F6E56"},{label:"To do",pct:pctTodo,count:todo,color:"#B4B2A9",tc:"#1a1a18"}].forEach(s=>{
    const row = el("div",{className:"bar-row"});
    const lbl = el("div",{className:"bar-label"});
    lbl.appendChild(el("span",{style:{color:"var(--text2)"}},s.label));
    const rhs = el("span",{style:{fontWeight:"500",color:s.tc}},s.count+" ");
    rhs.appendChild(el("span",{style:{color:"var(--text3)",fontWeight:"400"}},"("+s.pct+"%)"));
    lbl.appendChild(rhs);
    const track = el("div",{className:"bar-track"});
    const fill  = el("div",{className:"bar-fill",style:{width:s.pct+"%",background:s.color}});
    track.appendChild(fill);
    row.append(lbl,track);
    bars.appendChild(row);
  });
  const note = el("p",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"12px"}},total+" total tasks tracked");
  bars.appendChild(note);
  wrap.append(svg,bars);
  return wrap;
}

function renderTasksView(tasks) {
  const wrap = el("div",{});
  const q = (state.search||"").toLowerCase().trim();
  const filtered = q ? tasks.filter(t => t.title.toLowerCase().includes(q) || (t.tag||"").toLowerCase().includes(q)) : tasks;

  // add button / form
  if (!state.showAdd) {
    wrap.appendChild(el("button",{className:"add-btn",onClick:()=>{ state.showAdd=true; render(); }},"+ add a task"));
  } else {
    wrap.appendChild(renderAddForm());
  }

  if (filtered.length===0) {
    wrap.appendChild(el("div",{className:"empty"}, q ? `No tasks matching "${q}"` : "Nothing here yet. That's okay."));
    return wrap;
  }

  if (q) {
    filtered.forEach(t => wrap.appendChild(renderTaskCard(t)));
    return wrap;
  }

  PRI_ORDER.forEach(pval => {
    const group = filtered.filter(t=>t.priority===pval);
    if (!group.length) return;
    const p = PRI_MAP[pval];
    const open = state.buckets[pval] !== false;
    const hdr = el("button",{className:"bucket-header "+(open?"open":"closed"),
      style:{background:p.accent,color:p.text},
      onClick:()=>{ state.buckets[pval]=!open; render(); }});
    const left = el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    left.appendChild(el("span",{style:{fontSize:"16px"}},PRI_ICONS[pval]));
    left.appendChild(el("span",{},p.label));
    const badge = el("span",{className:"pill",style:{background:p.bg,color:p.text}},String(group.length));
    left.appendChild(badge);
    hdr.appendChild(left);
    hdr.appendChild(el("span",{style:{fontSize:"12px",opacity:"0.7"}},open?"▲":"▼"));
    wrap.appendChild(hdr);
    if (open) {
      const body = el("div",{className:"bucket-body"});
      group.forEach(t => body.appendChild(renderTaskCard(t)));
      wrap.appendChild(body);
    }
  });
  return wrap;
}

function renderAddForm() {
  const form = el("div",{className:"form-card"});
  form.appendChild(el("label",{className:"field-label"},"What needs doing?"));
  const titleInp = el("input",{placeholder:"Task title...",style:{marginBottom:"10px"}});
  const row = el("div",{className:"form-row"});
  const tagWrap = el("div",{}); tagWrap.appendChild(el("label",{className:"field-label"},"Tag"));
  const tagSel = el("select",{}); TAGS.forEach(t=>{ const o=el("option",{value:t},t); tagSel.appendChild(o); }); tagWrap.appendChild(tagSel);
  const priWrap = el("div",{}); priWrap.appendChild(el("label",{className:"field-label"},"When?"));
  const priSel = el("select",{}); PRIORITIES.forEach(p=>{ const o=el("option",{value:p.value},p.label); priSel.appendChild(o); }); priSel.value="whenever"; priWrap.appendChild(priSel);
  row.append(tagWrap,priWrap);
  form.appendChild(titleInp); form.appendChild(row);
  form.appendChild(el("label",{className:"field-label",style:{marginTop:"2px"}},"Steps (optional, one per line)"));
  const stepsInp = el("textarea",{placeholder:"e.g.\nFind the letter\nCall the number",style:{marginBottom:"10px",marginTop:"4px"}});
  const btns = el("div",{className:"flex-gap"});
  const save = el("button",{className:"btn-save",onClick:async()=>{
    const title = titleInp.value.trim(); if(!title) return;
    const steps = stepsInp.value.trim() ? stepsInp.value.split("\n").filter(Boolean).map((s,i)=>({id:i,text:s.trim(),done:false})) : [];
    const t = { id:uid(), title, tag:tagSel.value, priority:priSel.value, steps, addedBy:state.name, createdAt:new Date().toISOString() };
    await dbSet("tasks/"+t.id, t);
    state.showAdd=false;
  }},"Add task");
  const cancel = el("button",{className:"btn-cancel",onClick:()=>{ state.showAdd=false; render(); }},"Cancel");
  btns.append(save,cancel);
  form.append(stepsInp,btns);
  titleInp.addEventListener("keydown",e=>{ if(e.key==="Enter") save.click(); });
  return form;
}

function renderTaskCard(task) {
  const p = PRI_MAP[task.priority] || PRI_MAP["whenever"];
  if (state.editTaskId === task.id) return renderTaskEditForm(task);
  const card = el("div",{className:"card"});
  const body = el("div",{className:"card-body",style:{borderLeft:`3px solid ${p.bg}`}});
  body.appendChild(el("p",{style:{fontSize:"14px",fontWeight:"500",marginBottom:"7px",lineHeight:"1.4"}},task.title));
  const pills = el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}});
  pills.appendChild(el("span",{className:"pill",style:{background:p.bg,color:p.text}},p.label));
  pills.appendChild(el("span",{className:"pill",style:{background:TAG_COLORS[task.tag]||"#D3D1C7",color:TAG_TEXT[task.tag]||"#2C2C2A"}},task.tag));
  body.appendChild(pills);
  const steps = task.steps||[];
  if (steps.length) {
    const done = steps.filter(s=>s.done).length;
    const sWrap = el("div",{style:{marginTop:"10px"}});
    const sHdr = el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}});
    sHdr.appendChild(el("span",{style:{fontSize:"11px",color:"var(--text3)"}},"Steps"));
    sHdr.appendChild(el("span",{style:{fontSize:"11px",color:"var(--text3)"}},done+"/"+steps.length));
    const track = el("div",{className:"step-progress"});
    track.appendChild(el("div",{className:"step-progress-fill",style:{width:(done/steps.length*100)+"%"}}));
    sWrap.append(sHdr,track);
    steps.forEach(step=>{
      const row = el("div",{className:"step-row"});
      const cb  = el("input",{type:"checkbox"});
      cb.checked = step.done;
      cb.addEventListener("change",async()=>{
        await dbUpd("tasks/"+task.id+"/steps",steps.map(s=>s.id===step.id?{...s,done:cb.checked}:s));
      });
      const span = el("span",{className:"step-text"+(step.done?" done":"")},step.text);
      row.append(cb,span); sWrap.appendChild(row);
    });
    body.appendChild(sWrap);
  }
  if (task.addedBy) body.appendChild(el("p",{className:"meta"},"added by "+task.addedBy+" · "+fmtDate(task.createdAt)));
  card.appendChild(body);
  const actions = el("div",{className:"card-actions"});
  const doneBtn = el("button",{className:"primary",onClick:()=>{ state.outcomeTaskId=task.id; render(); }},"Mark done");
  const editBtn = el("button",{onClick:()=>{ state.editTaskId=task.id; render(); }},"Edit");
  const remBtn  = el("button",{onClick:async()=>{ await dbRem("tasks/"+task.id); }},"Remove");
  actions.append(doneBtn,editBtn,remBtn);
  card.appendChild(actions);
  return card;
}

function renderTaskEditForm(task) {
  const form = el("div",{className:"form-card"});
  form.appendChild(el("label",{className:"field-label"},"Description"));
  const titleInp = el("input",{style:{marginBottom:"10px"}}); titleInp.value = task.title;
  const row = el("div",{className:"form-row"});
  const priWrap = el("div",{}); priWrap.appendChild(el("label",{className:"field-label"},"Priority"));
  const priSel = el("select",{}); PRIORITIES.forEach(p=>{ const o=el("option",{value:p.value},p.label); priSel.appendChild(o); }); priSel.value=task.priority; priWrap.appendChild(priSel);
  const tagWrap = el("div",{}); tagWrap.appendChild(el("label",{className:"field-label"},"Tag"));
  const tagSel = el("select",{}); TAGS.forEach(t=>{ const o=el("option",{value:t},t); tagSel.appendChild(o); }); tagSel.value=task.tag; tagWrap.appendChild(tagSel);
  row.append(priWrap,tagWrap);
  form.append(titleInp,row);
  const btns = el("div",{className:"flex-gap"});
  const save = el("button",{className:"btn-save",onClick:async()=>{
    if(!titleInp.value.trim()) return;
    await dbUpd("tasks/"+task.id,{title:titleInp.value.trim(),priority:priSel.value,tag:tagSel.value});
    state.editTaskId=null;
  }},"Save");
  const cancel = el("button",{className:"btn-cancel",onClick:()=>{ state.editTaskId=null; render(); }},"Cancel");
  btns.append(save,cancel);
  form.appendChild(btns);
  titleInp.addEventListener("keydown",e=>{ if(e.key==="Enter") save.click(); });
  return form;
}

function renderWinsView(wins) {
  const wrap = el("div",{});
  const q = (state.search||"").toLowerCase().trim();
  const filtered = q ? wins.filter(w => w.title.toLowerCase().includes(q) || (w.tag||"").toLowerCase().includes(q) || (w.outcome||"").toLowerCase().includes(q)) : wins;
  filtered.sort((a,b)=>new Date(b.completedAt)-new Date(a.completedAt));
  if (!filtered.length) {
    wrap.appendChild(el("div",{className:"empty"}, q ? `No wins matching "${q}"` : "Completed tasks will appear here as a record of progress."));
    return wrap;
  }
  filtered.forEach(w => wrap.appendChild(renderWinCard(w)));
  return wrap;
}

function renderWinCard(win) {
  if (state.editWinId === win.id) return renderWinEditForm(win);
  const card = el("div",{className:"card"});
  const body = el("div",{className:"card-body",style:{borderLeft:`3px solid ${TAG_COLORS[win.tag]||"#D3D1C7"}`}});
  const top = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px",marginBottom:"8px"}});
  top.appendChild(el("p",{style:{fontSize:"15px",fontWeight:"500",lineHeight:"1.4"}},win.title));
  top.appendChild(el("span",{className:"pill",style:{background:TAG_COLORS[win.tag]||"#D3D1C7",color:TAG_TEXT[win.tag]||"#2C2C2A",flexShrink:"0"}},win.tag));
  body.appendChild(top);
  if (win.outcome) body.appendChild(el("p",{style:{fontSize:"13px",color:"var(--text2)",fontStyle:"italic",lineHeight:"1.5",marginBottom:"8px"}},'"'+win.outcome+'"'));
  body.appendChild(el("p",{className:"meta"},(win.completedBy?"completed by "+win.completedBy+" · ":"")+fmtDate(win.completedAt)));
  card.appendChild(body);
  const actions = el("div",{className:"card-actions"});
  actions.append(
    el("button",{onClick:()=>{ state.editWinId=win.id; render(); }},"Edit"),
    el("button",{onClick:async()=>{ await dbRem("wins/"+win.id); }},"Remove")
  );
  card.appendChild(actions);
  return card;
}

function renderWinEditForm(win) {
  const form = el("div",{className:"form-card"});
  form.appendChild(el("label",{className:"field-label"},"Task title"));
  const titleInp = el("input",{style:{marginBottom:"10px"}}); titleInp.value=win.title;
  form.appendChild(titleInp);
  form.appendChild(el("label",{className:"field-label"},"Tag"));
  const tagSel = el("select",{style:{marginBottom:"10px"}}); TAGS.forEach(t=>{ const o=el("option",{value:t},t); tagSel.appendChild(o); }); tagSel.value=win.tag;
  form.appendChild(tagSel);
  form.appendChild(el("label",{className:"field-label"},"Outcome note"));
  const ta = el("textarea",{placeholder:"How did it go?",style:{marginBottom:"10px"}}); ta.value=win.outcome||"";
  form.appendChild(ta);
  const btns = el("div",{className:"flex-gap"});
  const save = el("button",{className:"btn-save",onClick:async()=>{
    if(!titleInp.value.trim()) return;
    await dbUpd("wins/"+win.id,{title:titleInp.value.trim(),tag:tagSel.value,outcome:ta.value.trim()});
    state.editWinId=null;
  }},"Save");
  const cancel = el("button",{className:"btn-cancel",onClick:()=>{ state.editWinId=null; render(); }},"Cancel");
  btns.append(save,cancel);
  form.appendChild(btns);
  return form;
}

// ─── init ────────────────────────────────────────────────────────────────────
function init() {
  state.name = localStorage.getItem("calm-todo-name") || "";

  // seed tasks if db is empty
  dbListen("tasks", data => {
    state.tasks = data || {};
    if (!data) {
      SEED_TASKS.forEach(async (t) => {
        const task = { id:uid(), ...t, steps:[], addedBy:"You", createdAt:new Date().toISOString() };
        await dbSet("tasks/"+task.id, task);
      });
    }
    render();
  });

  dbListen("wins", data => {
    state.wins = data || {};
    render();
  });
}

document.addEventListener("firebaseReady", init);
</script>
</body>
</html>
